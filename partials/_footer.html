<!-- 
    _footer.html - Shared footer partial.
    Loaded dynamically into each page's #sharedFooter.
-->

<style>
    .footer-main {
        background: var(--primary-green);
        border-top: 2px solid var(--mid-green);
        font-family: 'Space Grotesk', sans-serif;
        padding: 1rem 1rem 1.25rem 1rem;
        color: var(--text-light);
        text-align: center;

    }

    .footer-content-wrapper {
        display: flex;
        justify-content: space-between; /* This pushes elements to the far left and right */
        align-items: center;
        flex-wrap: wrap;
        gap: 1.5rem;
        margin-bottom: 1rem;
    }

    
    .copyright-text {
        margin: 0; /* Prevents paragraph margin from breaking alignment */
        font-weight: 500;
    }

    .footer-btn-group {
        display: flex;
        gap: 1rem;
        flex-wrap: wrap;
    }


    .tilde-icon {
        width: 1em;
        height: 1em;
        vertical-align: middle;
    }

    /* The Button Style */
    .footer-btn {
        background: var(--mid-green);
        color: var(--text-light) !important;
        text-decoration: none;
        padding: 0.5rem 1.25rem;
        border-radius: 50px; 
        border: 1px solid var(--lime-green);
        transition: all 0.3s ease;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }

    .footer-btn:hover {
        background: var(--text-light);
        color: var(--deep-green) !important; 
        transform: translateY(-2px);
        box-shadow: 0 4px 2px rgba(0,0,0,0.1);
    }

    .footer-btn:hover i {
        color: var(--mid-green);
    }

    .footer-meta {
        display: flex;
        justify-content: start;
        font-size: 9pt !important;
        font-weight: 300;
        font-style: italic;
        margin: 0.2rem;
        opacity: 0.75;
    }


    .tilde-icon {
        width: 1em;
        height: 0.8em;
        color: var(--dark-emerald) !important;
        margin: 0.22rem 0.1rem;
        display: inline-block;
    }


    .github-pal {
        color: var(--dark-emerald) !important;
        font-weight: 500;
    }

    /* Mobile: Stack them vertically and center them */
    @media (max-width: 768px) {
        .footer-content-wrapper {
            flex-direction: column;
            justify-content: center;
            text-align: center;
        }
        
        .footer-btn-group {
            justify-content: center;
        }
    }

</style>


<footer class="footer-main">
    <div class="container footer-content-wrapper px-5 mb-2">
        <p class="copyright-text">© 2026 John Doe. All rights reserved.</p>

        <div class="footer-btn-group">
            <a href="mailto:name@email.com" class="footer-btn">
                <i class="bi bi-envelope-fill"></i> Email
            </a>
            <a href="https://www.linkedin.com/in/username" target="_blank" class="footer-btn">
                <i class="bi bi-linkedin"></i> LinkedIn
            </a>
            <a href="https://gabe2231.itch.io/" target="_blank" class="footer-btn">
                <i class="bi bi-controller"></i> itch.io
            </a>
        </div>
    </div>

    <div class="container px-5 mt-0">
        <p class="footer-meta">
            Designed & developed with care. 
            <svg class="tilde-icon" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
                <path
                    d="M2 9
                    C4 6, 6 6, 8 9
                    C10 12, 12 12, 14 9"
                    fill="none" stroke="currentColor"
                    stroke-width="1.6" stroke-linecap="round" /> 
            </svg>
            <a href="https://github.com/genesism-dev" class="text-decoration-none github-pal" target="_blank">genesism-dev</a>
        </p>
    </div>

</footer>
