<style>
    .footer-main {
        background: var(--primary-green);
        border-top: 2px solid var(--mid-green);
        font-family: 'Space Grotesk', sans-serif;
        padding: 0.5rem 1rem;
        color: var(--text-light);
        box-shadow: -2px -2px 12px rgba(16, 28, 18, 0.25);
        text-align: center;
        display: flex;
        flex-direction: column;
        justify-content: center;
    }

    .footer-content-wrapper {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: nowrap;
        gap: 1.5rem;
        margin-bottom: 0.65rem;
        min-height: 72px;
    }

    .copyright-text {
        margin: 0;
        font-weight: 500;
        display: flex;
        align-items: center;
        min-height: 100%;
    }

    .footer-meta {
        display: flex;
        justify-content: start;
        font-size: 9pt !important;
        font-weight: 300;
        font-style: italic;
        opacity: 0.75;
    }

    .tilde-icon {
        width: 1em;
        height: 0.8em;
        color: var(--dark-emerald) !important;
        margin: 0.22rem 0.1rem;
        display: inline-block;
        vertical-align: middle;
    }

    .github-pal {
        color: var(--dark-emerald) !important;
        font-weight: 500;
    }

    .footer-btn-group {
        display: flex;
        position: static;
        transform: none;
        gap: 1rem;
        flex-wrap: wrap;
        align-items: center;
        justify-content: center;
        margin-left: 0;
        min-height: 100%;
    }
    
    /* The Button Style */
    .footer-btn {
        background: var(--mid-green);
        color: var(--text-light) !important;
        text-decoration: none;
        padding: 0.4rem 1rem;
        border-radius: 50px; 
        border: 0.125rem solid var(--lime-green);
        transition: all 0.3s ease;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }

    .footer-btn:hover {
        background: #e0f2e9;
        color: var(--blood-orange) !important; 
        font-weight: 800;
        transform: translateY(-2px);
        box-shadow: 0 4px 2px rgba(0,0,0,0.1);
        border-color: var(--primary-orange);
    }

    .footer-btn:hover i {
        color: var(--mid-green) !important;
    }

    
    /* Vertical and center stacking */
    @media (max-width: 768px) {
    .footer-content-wrapper {
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        min-height: auto;
    }
    
}

</style>
