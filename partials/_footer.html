<!-- 
    _footer.html - Shared footer partial.
    Loaded dynamically into each page's #sharedFooter.
-->

<style>
    .footer-main {
        background: var(--primary-green);
        border-top: 2px solid var(--mid-green);
        font-family: 'Space Grotesk', sans-serif;
        padding: 0.75rem 1rem;
        color: var(--text-light);
        box-shadow: -2px -2px 12px rgba(16, 28, 18, 0.25);
        text-align: center;
        display: flex;
        flex-direction: column;
        justify-content: center;
    }

    .footer-content-wrapper {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 1rem 1.5rem;
        margin-bottom: 0.65rem;
        min-height: 72px;
    }

    .footer-text-block {
        min-width: 0;
    }

    .copyright-text {
        margin: 0;
        font-weight: 500;
        display: flex;
        align-items: center;
        min-height: 100%;
    }

    .footer-meta {
        display: flex;
        justify-content: flex-start;
        align-items: center;
        flex-wrap: wrap;
        gap: 0.2rem;
        font-size: 0.75rem !important;
        font-weight: 300;
        font-style: italic;
        opacity: 0.75;
    }

    .tilde-icon {
        width: 1em;
        height: 0.8em;
        color: var(--dark-emerald) !important;
        margin: 0.22rem 0.1rem;
        display: inline-block;
        vertical-align: middle;
    }

    .github-pal {
        color: var(--dark-emerald) !important;
        font-weight: 500;
    }

    .footer-btn-group {
        display: flex;
        gap: 0.75rem;
        flex-wrap: wrap;
        align-items: center;
        justify-content: center;
    }

    .footer-btn {
        background: var(--mid-green);
        color: var(--easter-green) !important;
        text-decoration: none;
        padding: 0.55rem 1rem;
        border-radius: 999px;
        border: 0.125rem solid var(--lime-green);
        transition: all 0.3s ease;
        font-weight: 500;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        min-height: 44px;
        min-width: 44px;
        white-space: nowrap;
    }

    .footer-btn:hover {
        background: #e0f2e9;
        color: var(--blood-orange) !important;
        font-weight: 800;
        transform: translateY(-2px);
        box-shadow: 0 4px 2px rgba(0, 0, 0, 0.1);
        border-color: var(--primary-orange);
    }

    .footer-btn:hover i {
        color: var(--mid-green) !important;
    }

    .footer-btn i {
        font-size: 1rem;
        line-height: 1;
    }

    @media (max-width: 768px) {
        .footer-main {
            padding: 1rem;
        }

        .footer-content-wrapper {
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            min-height: auto;
            gap: 1rem;
        }

        .footer-text-block {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .copyright-text,
        .footer-meta {
            justify-content: center;
            text-align: center;
        }

        .footer-btn-group {
            width: 100%;
            gap: 0.75rem;
        }

        .footer-icon-btn {
            width: 44px;
            height: 44px;
            padding: 0;
            border-radius: 50%;
            flex: 0 0 auto;
        }

        .footer-btn-label {
            display: none;
        }

        .footer-icon-btn i {
            font-size: 1.1rem;
            margin: 0;
        }
    }

    @media (max-width: 480px) {
        .footer-main .container {
            padding-left: 0 !important;
            padding-right: 0 !important;
        }

        .footer-meta {
            font-size: 0.72rem !important;
            line-height: 1.4;
        }

        .footer-btn-group {
            gap: 0.6rem;
        }
    }
</style>

</footer>
