<!-- 
    _header.html - Shared header for all pages.
    Contains site title, bio, and navigation.
    Loaded dynamically into each page's #sharedHeader.
-->
<style>
    header {
        background: var(--primary-green);
        color: #f1f1f1;
        padding: 2rem 1rem 0.4rem 1rem;
        text-align: center;
        box-shadow: 0 2px 12px rgba(16, 28, 18, 0.25);
        border-bottom: 2px solid var(--mid-green);
        border-radius: 0;
    }

    .green-ruler {
        width: 100%;
        height: 0.18rem;
        background: var(--dark-emerald-80);
        margin: 0.5rem 0;
        border-top: 0.12rem solid var(--lime-green);
        opacity: 0.45 !important;
    }

    .w-95 { width: 95% !important;}

.navbar-main {
    position: relative;
}

.nav-dropdown {
    position: relative;
    display: inline-block;
}

.nav-dropdown::after {
    content: "";
    position: absolute;
    top: 100%;
    left: -18px;
    width: calc(100% + 36px);
    height: 24px;
}

.dropdown-menu {
    display: none;
    position: absolute;
    top: calc(100% + 8px);
    left: -0.25rem;
    background: var(--primary-green);
    border: 0.0625rem solid var(--primary-green);
    border-top: 2px solid var(--mid-green);
    border-bottom: 3px solid var(--easter-green-E6);
    border-radius: 0 !important;
    z-index: 1000;
    padding: 0.25rem;
    box-sizing: border-box;
    transform: none;
}

.nav-dropdown:hover .dropdown-menu,
.nav-dropdown:focus-within .dropdown-menu {
    display: block;
}

    .dropdown-toggle::after {
        content: none !important;
        border: 0 !important;
        display: none;
        margin-left: 0 !important;
    }

    .dropdown-toggle {
        display: inline-flex;
        align-items: center;
        gap: 0.45rem;
        text-decoration: none;
        color: inherit;
    }

    .dropdown-chevron {
        width: 0.95rem;
        height: 0.95rem;
        flex-shrink: 0;
        transition: transform 0.22s ease;
        transform-origin: center;
    }

    .nav-dropdown:hover .dropdown-chevron,
    .nav-dropdown:focus-within .dropdown-chevron {
        transform: rotate(180deg);
    }

.dropdown-menu a {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.55rem;
    width: 100%;
    min-height: 44px;
    padding: 0.7rem 0.9rem;
    box-sizing: border-box;
    text-decoration: none;
    border: 2px solid var(--dark-emerald-80);
    border-radius: 3px;
    white-space: nowrap;
    text-align: center;
    margin-top: 2px;
    margin-bottom: 4px;
}


    .dropdown-menu a .nav-icon {
    width: 1rem;
    text-align: center;
    flex: 0 0 1rem;
}

    .nav-dropdown::after {
    content: "";
    position: absolute;
    top: 100%;
    left: -10px;
    width: calc(100% + 20px);
    height: 18px;              
}

</style>

<header>
    <div class="d-flex justify-content-start ps-5 pb-2">
<div class="d-inline-flex align-items-center">
        <img src="assets/apple-touch-icon.png" alt="Profile Picture" class="profile-pic me-2" height="55px">
        <h4 class="text-start ps-1 hero-title mb-0">
        
        <span class="hero-name">Gabriel Rodríguez</span> - <span class="shiny-text">Game Designer Portfolio</span>
    </h4> 
    </div>


    </div>
    
     
    <p class="ps-5 pb-2 bio">Hi, I’m <span class="fw-bold">Gabriel Rodríguez</span>, 
        a Technical Game Designer with experience in systems design, level design, 
        and gameplay implementation.
    </p>
        
    <hr class="green-ruler">

    <nav class="navbar-main">
        <a href="index.html">
            <i class="bi bi-house-fill me-2 nav-icon"></i>Home
        </a>

        <div class="nav-dropdown">
            <a href="#" class="dropdown-toggle pe-2">
                <i class="bi bi-grid-fill nav-icon"></i>Works
        <svg class="dropdown-chevron me-1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" aria-hidden="true">
            <path
                d="M2 5l6 6 6-6"
                fill="none"
                stroke="currentColor"
                stroke-width="2.8"
                stroke-linecap="round"
                stroke-linejoin="round"
            />
        </svg>
            </a>

            <div class="dropdown-menu">
                <a href="professional.html">
                    <i class="bi bi-briefcase-fill nav-icon me-1"></i>
                    <span>Professional</span>
                </a>
                <a href="personal.html">
                    <i class="bi bi-heart-fill nav-icon me-1"></i>
                    <span style="letter-spacing: 3px;">Personal</span>
                </a>
            </div>
        </div>

        <a href="contact.html">
            <i class="bi bi-envelope-fill me-2 nav-icon"></i>Contact
        </a>
    </nav>        
</header>
