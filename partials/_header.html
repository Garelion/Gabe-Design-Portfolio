<!-- 
    _header.html - Shared header for all pages.
    Contains site title, bio, and navigation.
    Loaded dynamically into each page's #sharedHeader.
-->
<style>

.nav-toggle,
.mobile-sidebar,
.nav-overlay {
    display: none;
}

.sidebar-dropdown-toggle {
    font-family: 'Inter Tight', sans-serif;
    font-size: 1.08rem;
    letter-spacing: 2px;
}

    header {
        background: var(--primary-green);
        color: #f1f1f1;
        padding: 2rem 1rem 0.4rem 1rem;
        text-align: center;
        box-shadow: 0 2px 12px rgba(16, 28, 18, 0.25);
        border-bottom: 2px solid var(--mid-green);
        border-radius: 0;
    }

    .green-ruler {
        width: 100%;
        height: 0.18rem;
        background: var(--dark-emerald-80);
        margin: 0.5rem 0;
        border-top: 0.12rem solid var(--lime-green);
        opacity: 0.45 !important;
    }

    .w-95 { width: 95% !important;}

.navbar-main {
    position: relative;
}

.nav-dropdown {
    position: relative;
    display: inline-block;
}

.nav-dropdown::after {
    content: "";
    position: absolute;
    top: 100%;
    left: -18px;
    width: calc(100% + 36px);
    height: 24px;
}

.dropdown-menu {
    display: none;
    position: absolute;
    top: calc(100% + 8px);
    left: -0.25rem;
    background: var(--primary-green);
    border: 0.0625rem solid var(--primary-green);
    border-top: 2px solid var(--mid-green);
    border-bottom: 3px solid var(--easter-green-E6);
    border-radius: 0 !important;
    z-index: 1000;
    padding: 0.25rem;
    box-sizing: border-box;
    transform: none;
}

.nav-dropdown:hover .dropdown-menu,
.nav-dropdown:focus-within .dropdown-menu {
    display: block;
}

    .dropdown-toggle::after {
        content: none !important;
        border: 0 !important;
        display: none;
        margin-left: 0 !important;
    }

    .dropdown-toggle {
        display: inline-flex;
        align-items: center;
        gap: 0.45rem;
        text-decoration: none;
        color: inherit;
    }

    .dropdown-chevron {
        width: 0.95rem;
        height: 0.95rem;
        flex-shrink: 0;
        transition: transform 0.22s ease;
        transform-origin: center;
    }

    .nav-dropdown:hover .dropdown-chevron,
    .nav-dropdown:focus-within .dropdown-chevron {
        transform: rotate(180deg);
    }

.dropdown-menu a {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.55rem;
    width: 100%;
    min-height: 44px;
    padding: 0.7rem 0.9rem;
    box-sizing: border-box;
    text-decoration: none;
    border: 2px solid var(--dark-emerald-80);
    border-radius: 3px;
    white-space: nowrap;
    text-align: center;
    margin-top: 2px;
    margin-bottom: 4px;
}


    .dropdown-menu a .nav-icon {
    width: 1rem;
    text-align: center;
    flex: 0 0 1rem;
}

    .nav-dropdown::after {
    content: "";
    position: absolute;
    top: 100%;
    left: -10px;
    width: calc(100% + 20px);
    height: 18px;              
}


/* =====================================
   Mobile
===================================== */

@media (max-width: 768px) {

    header {
        padding: 1rem 0 0.35rem;
    }

    header > .d-flex {
        justify-content: space-between !important;
        align-items: center;
        padding-left: 1rem !important;
        padding-right: 1rem !important;
        padding-bottom: 0.75rem !important;
    }

    header .d-inline-flex {
        min-width: 0;
        align-items: center !important;
    }

    .profile-pic {
        width: 48px;
        height: 48px;
        flex: 0 0 48px;
    }

    header .hero-title {
        font-size: clamp(0.95rem, 4.2vw, 1.25rem) !important;
        line-height: 1.15;
        letter-spacing: 1.2px;
        overflow-wrap: anywhere;
    }

    .hero-name {
        font-size: inherit !important;
    }

    .bio {
        padding-left: 1rem !important;
        padding-right: 1rem !important;
        font-size: 0.95rem;
        line-height: 1.35;
        letter-spacing: 0.4px;
    }

    nav.navbar-main {
        justify-content: flex-end;
        padding: 0 0.75rem 0rem;
    }

    .desktop-nav {
        display: none;
    }

    /* =====================================
    Reset desktop nav styling in sidebar
    ===================================== */

    .mobile-sidebar * {
        border-radius: 0 !important;
        box-shadow: none !important;
    }

    /* Remove desktop button appearance */
    .mobile-sidebar a,
    .mobile-sidebar button {
        border: none !important;
        background: transparent !important;
        appearance: none;
        -webkit-appearance: none;
    }

    /* Override desktop dropdown link styling */
    .mobile-sidebar .dropdown-menu a,
    .mobile-sidebar .sidebar-dropdown-menu a {
        display: flex;
        justify-content: flex-start !important;
        align-items: center;

        border: none !important;
        margin: 0 !important;
        min-height: auto !important;
        width: 100%;

        background: transparent !important;
        text-align: left !important;

        padding: 0.7rem 3.2rem !important;
    }

    /* Main nav rows */
  .mobile-sidebar > a {
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 0.85rem;
  }

  .sidebar-dropdown-toggle {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    color: inherit;
    font: inherit;
  }

  .sidebar-dropdown-toggle > span {

    align-items: center;

  }

    .nav-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        margin-left: auto;
        background: var(--teal-ink-80);
        border: 2px solid var(--teal-ink-80);
        border-radius: 4px;
        color: white !important;
        font-size: 2rem;
        cursor: pointer;
    }

    /* Dark overlay */
    .nav-overlay {
        display: block;
        position: fixed;
        inset: 0;

        background: rgba(0,0,0,.45);

        opacity: 0;
        visibility: hidden;

        transition: opacity .25s ease;
        z-index: 998;
    }

    .nav-overlay.active {
        opacity: 1;
        visibility: visible;
    }

    /* Sidebar */
    .mobile-sidebar {
        display: flex;
        flex-direction: column;

        position: fixed;
        top: 0;
        right: 0;

        width: 300px;
        max-width: 85vw;
        height: 100vh;

        background: var(--primary-green);

        border-left: 2px solid var(--mid-green);


        transform: translateX(100%);
        transition: transform .28s ease;

        z-index: 999;
        overflow-y: auto;
    }

    .mobile-sidebar.active {
        transform: translateX(0);
    }

    /* Header */
    .sidebar-header {
        display: flex;
        justify-content: space-between;
        align-items: center;

        padding: 1.25rem;

        border-bottom: 1px solid rgba(255,255,255,.15);
        font-size: 1.15rem;
        font-weight: 600;
    }

    .sidebar-close {
        background: transparent;
        border: none;
        color: white;
        font-size: 1.3rem;
        cursor: pointer;
    }

    /* Links */
    /* =====================================
    Sidebar Navigation Style
    ===================================== */

    .mobile-sidebar a,
    .sidebar-dropdown-toggle {
        display: flex;
        align-items: center;
        justify-content: space-between;

        width: 100%;

   

        text-decoration: none;

        background: transparent;
        border: none;

        font-size: 1rem;
        font-weight: 400;
        text-align: left;

        transition:
            background .18s ease,
            padding-left .18s ease;
    }

    /* Hover / tap feedback */
    .mobile-sidebar a:hover,
    .sidebar-dropdown-toggle:hover {
        background: rgba(255,255,255,.06);
    }

    /* Main sections */
    .mobile-sidebar > a,
    .sidebar-dropdown-toggle {
        min-height: 52px;
    }

    /* Divider between items */
    .mobile-sidebar > a,
    .sidebar-dropdown {
        border-bottom: 1px solid rgba(255,255,255,.08);
    }

        .sidebar-dropdown-menu {
        display: none;

        padding: 0.35rem 0 0.5rem;

        background:
            linear-gradient(
                to bottom,
                rgba(0,0,0,.10),
                rgba(0,0,0,.05)
            );
    }

    /* Sub-items */
    .sidebar-dropdown-menu a {
        padding-left: 3.2rem;
        font-size: 0.95rem;
        opacity: .9;

        border: none;
    }

    /* Tiny visual indent line feeling */
    .sidebar-dropdown-menu a:hover {
        padding-left: 3.5rem;
    }

        .sidebar-dropdown.open .sidebar-dropdown-menu {
            display: block;
        }

        .sidebar-dropdown.open .bi-chevron-down {
            transform: rotate(180deg);
        }

        .bi-chevron-down {
            transition: transform .22s ease;
        }
}

</style>
