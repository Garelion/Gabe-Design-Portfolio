<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }}</title>
  <meta name="description" content="{% if page.description %}{{ page.description | escape }}{% else %}Technical game designer specializing in gameplay systems and level design, with experience in Unreal and Unity.%{% endif %}">
  <link rel="canonical" href="{% if page.url == '/' %}{{ site.url }}{{ site.baseurl }}/{% else %}{{ site.url }}{{ site.baseurl }}{{ page.url }}{% endif %}">

  <link rel="icon" href="{{ '/favicon.ico' | relative_url }}" type="image/x-icon">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/favicon-32x32.png' | relative_url }}">
  <link rel="apple-touch-icon" href="{{ '/assets/apple-touch-icon.png' | relative_url }}">

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "Person",
        "name": "Gabriel Rodriguez",
        "jobTitle": "Technical Game Designer",
        "url": "{{ site.url }}{{ site.baseurl }}/",
        "sameAs": [
          "https://www.linkedin.com/in/gabriel-rodriguez-50a2a71a4/",
          "https://github.com/garelion"
        ],
        "knowsAbout": [
          "Gameplay systems design",
          "Level design",
          "Unreal Engine 5",
          "Unity",
          "Live service games"
        ],
        "description": "Technical game designer focused on gameplay systems, level construction, and implementation."
      },
      {
        "@type": "WebSite",
        "name": "Gabriel Rodriguez Portfolio",
        "url": "{{ site.url }}{{ site.baseurl }}/"
      }
    ]
  }
  </script>


  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=simulation" />

  <link rel="stylesheet" href="{{ '/css/style.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/css/loading.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/css/header-footer.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/css/carousels.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/css/lightbox.css' | relative_url }}">

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ '/js/carousels.js' | relative_url }}" defer></script>
  <script src="{{ '/js/layout.js' | relative_url }}" defer></script>
</head>
<body>
  <div id="page-loader" class="is-hidden">
    <div class="loader-bar"></div>
  </div>

  <div class="page-wrapper">
    {% include header.html %}

    {{ content }}

    {% include footer.html %}
  </div>
</body>
</html>
